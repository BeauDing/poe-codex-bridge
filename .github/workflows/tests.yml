name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run unit tests
        run: |
          python -m unittest tests/test_runtime_env.py
          python -m unittest tests/test_packaged_review_helpers.py
          python -m unittest tests/test_cli_wrappers.py
